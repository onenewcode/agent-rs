[policy]
version = 1

[enforcement]
scope = "writes_and_high_risk_only"
unknown_command = "allow_warn"

[paths]
mode = "blocklist_only"
blocked_write_paths = [".git/**"]

[commands]
allowed_prefixes = [
  "git status",
  "git diff",
  "git ls-files",
  "ls",
  "cat",
  "rg",
]
write_prefixes = [
  "git add",
  "git commit",
  "git mv",
  "git rm",
  "git apply",
  "touch",
  "mkdir",
  "cp",
  "mv",
  "tee",
  "truncate",
  "chmod",
  "chown",
  "ln",
]
blocked_prefixes = [
  "rm",
  "git reset",
  "git checkout",
  "git clean",
]
high_risk_prefixes = [
  "rm",
  "git reset",
  "git checkout",
  "git clean",
]
