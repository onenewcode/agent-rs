# Legacy-compatible top-level fields (consumed by older hook implementations).
allowed_paths = [
  "**",
  ".harness/**",
  ".codex/**",
  ".claude/**",
  ".gemini/**",
  "AGENTS.md",
  "CLAUDE.md",
  "GEMINI.md",
  ".gitignore",
  "Cargo.toml",
  "Cargo.lock",
  "agent.example.toml",
  "apps/**",
  "crates/**",
]
blocked_paths = [".git/**"]

allowed_commands = [
  "git status",
  "git diff",
  "git ls-files",
  "ls",
  "cat",
  "rg",
  "python3 .harness/sync.py",
  "python3",
]
blocked_commands = [
  "rm",
  "git reset",
  "git checkout",
  "git clean",
]

[policy]
version = 1

[enforcement]
scope = "writes_and_high_risk_only"
unknown_command = "allow_warn"

[paths]
mode = "blocklist_only"
blocked_write_paths = [".git/**"]
allowed_write_paths = ["**"]

[commands]
allowed_prefixes = [
  "git status",
  "git diff",
  "git ls-files",
  "ls",
  "cat",
  "rg",
]
blocked_prefixes = [
  "rm",
  "git reset",
  "git checkout",
  "git clean",
]
high_risk_prefixes = [
  "rm",
  "git reset",
  "git checkout",
  "git clean",
]
